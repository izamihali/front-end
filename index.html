<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Detection</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}
#startOverlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  color: white;
  font-family: "Quantico";
  font-size: 1.2rem;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="startOverlay">Tap to start camera</div>

<script type="module">
import { connectors, webrtc, streams } from "https://esm.sh/@roboflow/inference-sdk";

// Hidden video element that the Roboflow SDK writes the processed stream into.
// p5 reads pixels from this element each frame rather than capturing its own camera.
const hiddenVideo = document.createElement("video");
hiddenVideo.autoplay = true;
hiddenVideo.playsInline = true;
hiddenVideo.muted = true;
hiddenVideo.style.display = "none";
document.body.appendChild(hiddenVideo);

window.latestPredictions = null;
window.videoEl = hiddenVideo;
window.streamReady = false;

async function start() {
  // Backend proxy — keeps your Roboflow API key off the public page
  const connector = connectors.withProxyUrl("https://backend-nrhq.onrender.com/api/init-webrtc");

  const stream = await streams.useCamera({ video: { facingMode: "environment" } });

  const connection = await webrtc.useStream({
    source: stream,
    connector,
    wrtcParams: {
      workspaceName: "qsfdsafewsdfsdfsdfs-workspace",
      workflowId: "custom-workflow",
      streamOutputNames: ["preview_image"],
      dataOutputNames: [
        "mask_predictions",
        "detector_predictions",
        "expanded_ad_prompt",
        "mask_debug",
        "foreground_person_mask",
        "mask_points",
        "mask_points_debug"
      ],
      processingTimeout: 3600,
      // Try "webrtc-gpu-small" first and compare latency before going back to medium/large.
      requestedPlan: "webrtc-gpu-small",
      requestedRegion: "eu", // Options: us, eu, ap
    },
    onData: (data) => {
      window.latestPredictions = data;
    }
  });

  hiddenVideo.srcObject = await connection.remoteStream();
  window.streamReady = true;

  document.getElementById("startOverlay").style.display = "none";

  // Keep the screen awake for unattended exhibition use, if supported
  if ("wakeLock" in navigator) {
    navigator.wakeLock.request("screen").catch(() => {});
  }
}

document.getElementById("startOverlay").addEventListener("click", start);
</script>

<script>
// ---------- p5.js sketch ----------
let maskBuffer;

function setup() {
  createCanvas(windowWidth, windowHeight);
  noStroke();
  maskBuffer = createGraphics(windowWidth, windowHeight);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  maskBuffer = createGraphics(windowWidth, windowHeight);
}

function draw() {
  background(0);

  if (!window.streamReady || !window.videoEl.videoWidth) return;

  const vid = window.videoEl;
  const vw = vid.videoWidth;
  const vh = vid.videoHeight;

  // "Contain" fit: scale video to fit fully within the screen,
  // letterboxing (black bars) instead of cropping —
  // same behaviour as CSS object-fit: contain.
  // This guarantees the whole camera frame is visible on any phone,
  // regardless of its screen aspect ratio.
  const canvasRatio = width / height;
  const videoRatio = vw / vh;

  let drawW, drawH, offsetX, offsetY;

  if (videoRatio > canvasRatio) {
    // video is relatively wider than the screen -> fit to width, bars top/bottom
    drawW = width;
    drawH = width / videoRatio;
    offsetX = 0;
    offsetY = (height - drawH) / 2;
  } else {
    // video is relatively taller than the screen -> fit to height, bars left/right
    drawH = height;
    drawW = height * videoRatio;
    offsetX = (width - drawW) / 2;
    offsetY = 0;
  }

  // Draw the raw HTML video element onto the p5 canvas
  drawingContext.drawImage(vid, offsetX, offsetY, drawW, drawH);

  // Scale factors: native video pixel coords -> canvas display coords
  const scaleX = drawW / vw;
  const scaleY = drawH / vh;

  const data = window.latestPredictions;
  const detections = data?.outputs?.[0]?.mask_points || [];

  // Clear the offscreen mask buffer each frame
  maskBuffer.clear();
  maskBuffer.noStroke();
  maskBuffer.fill(0, 0, 0, 218);

  detections.forEach(pred => {
    pred.polygons.forEach(polygon => {
      if (!polygon.points || polygon.points.length < 3) return;
      maskBuffer.beginShape();
      polygon.points.forEach(pt => {
        maskBuffer.vertex(offsetX + pt.x * scaleX, offsetY + pt.y * scaleY);
      });
      maskBuffer.endShape(CLOSE);
    });
  });

  // Composite the black mask shapes onto the main canvas, over the video
  // (Removed the per-frame console.log + maskBuffer.get() debug call that
  // was here before — reading pixels back every frame is expensive and
  // was likely the single biggest cause of the lag/low fps.)
  image(maskBuffer, 0, 0);
}
</script>
</body>
</html>
